# yt-faceless 設定ファイル
# `config.yaml` にコピーして使う（無くても下記の既定値で動作）

# --- LLM（台本・メタデータ生成） ---
llm:
  model: claude-opus-4-8
  effort: high          # low | medium | high | xhigh | max

# --- 台本 ---
script:
  target_minutes: 6     # 目安の動画尺（分）
  language: ja

# --- 音声（ElevenLabs） ---
tts:
  # 日本語に使う voice_id。ElevenLabs の Voice Library で選んでコピー。
  # 既定は ElevenLabs の多言語プリセット "Rachel"。日本語対応の声に差し替え推奨。
  voice_id: 21m00Tcm4TlvDq8ikWAM
  model_id: eleven_multilingual_v2
  stability: 0.5
  similarity_boost: 0.75

# --- 映像 ---
video:
  width: 1920
  height: 1080
  fps: 30
  background_color: "#0f1115"   # 素材が無いセクションの背景色
  # 字幕の見た目
  subtitle:
    font_size: 54
    primary_color: "&H00FFFFFF"   # 白（ASS形式のBGR）
    outline_color: "&H00000000"   # 黒フチ
    outline: 3
    margin_v: 90                  # 下からの余白(px)

# --- 素材（Pexels） ---
assets:
  per_section: 1        # 1セクションあたり取得する素材数
  prefer: video         # video | photo
