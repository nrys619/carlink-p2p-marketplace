services:
  - type: web
    name: carlink-p2p-marketplace
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run check
    startCommand: node server/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VISION_MODEL
        value: gpt-4.1-mini
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false
